<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>새 작품 등록 | PRINOL</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-shell">
    <div class="admin-topbar">
      <a class="admin-brand" href="admin.html">PRINOL ADMIN</a>
      <div class="admin-top-actions">
        <a class="ghost-button" href="admin.html">대시보드</a>
        <button class="ghost-button" id="logoutButton" type="button">로그아웃</button>
      </div>
    </div>

    <section class="page-head">
      <div>
        <p class="admin-eyebrow">UPLOAD</p>
        <h1>새 작품 등록</h1>
        <p class="page-subcopy">이미지는 선택, 드래그 앤 드롭, 또는 클립보드 붙여넣기(Ctrl/Cmd+V)를 지원합니다.</p>
      </div>
      <div class="page-head-actions">
        <button class="primary-button" id="uploadButton" type="button">작품 등록</button>
      </div>
    </section>

    <section class="admin-panel wide-panel">
      <div class="admin-form-grid">
        <label class="field span-12">
          <span class="field-label">이미지 파일</span>
          <input id="imageFile" type="file" accept="image/*">
          <div id="imageDropZone" class="upload-dropzone" tabindex="0">
            <strong>이미지를 여기에 드래그하세요</strong>
            <span>또는 이 영역을 클릭해 파일을 선택하거나, 캡처 이미지를 붙여넣으세요</span>
          </div>
          <small id="imageSizeInfo" class="help-text">선택 전</small>
        </label>

        <label class="field span-8">
          <span class="field-label">작품명</span>
          <input id="title" type="text" placeholder="작품명">
        </label>

        <label class="field span-4">
          <span class="field-label">연도</span>
          <input id="year" type="text" placeholder="예: 2025">
        </label>

        <label class="field span-6">
          <span class="field-label">카테고리</span>
          <select id="category">
            <option value="">카테고리 선택</option>
            <option value="Print">Print</option>
            <option value="Drawing">Drawing</option>
            <option value="Photography">Photography</option>
            <option value="Others">Others</option>
          </select>
        </label>

        <label class="field span-6">
          <span class="field-label">키워드</span>
          <input id="tags" type="text" placeholder="작품크기, 작품기법, 에디션수(Ed.1)">
        </label>

        <label class="field span-12">
          <span class="field-label">설명</span>
          <textarea id="description" rows="10" placeholder="작품 설명"></textarea>
        </label>

        <label class="toggle-field span-12">
          <input id="isPublic" type="checkbox" checked>
          <span>공개 작품으로 등록</span>
        </label>
      </div>

      <div class="status-line" id="uploadStatus"></div>
    </section>
  </main>

  <script src="admin-shell.js" defer></script>
  <script src="admin-new.js" defer></script>
</body>
</html>
