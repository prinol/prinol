<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRINOL ADMIN LOGIN</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">ADMIN ACCESS</p>
      <h1>관리자 로그인</h1>
      <p class="muted">관리자 암호를 입력해야 관리자 페이지를 볼 수 있습니다.</p>
      <form id="loginForm" class="stack-md">
        <label class="field-label" for="password">관리자 암호</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="primary-btn" type="submit">로그인</button>
        <p class="error-text hidden" id="loginError"></p>
      </form>
      <a class="text-link" href="./">공개 사이트로 돌아가기</a>
    </section>
  </main>
  <script src="login.js" defer></script>
</body>
</html>
