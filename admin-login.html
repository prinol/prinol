<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 로그인 | PRINOL</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-shell login-shell">
    <div class="login-card">
      <p class="admin-eyebrow">ADMIN ACCESS</p>
      <h1>관리자 로그인</h1>
      <p class="page-subcopy">관리자 암호를 입력해야 관리자 페이지를 볼 수 있습니다.</p>

      <div class="login-form">
        <label class="field span-12">
          <span class="field-label">관리자 암호</span>
          <input id="adminPassword" type="password" autocomplete="current-password" placeholder="암호 입력">
        </label>

        <div class="login-actions">
          <button class="primary-button" id="loginButton" type="button">로그인</button>
          <a class="ghost-button link-button" href="./">공개 사이트로 돌아가기</a>
        </div>
      </div>

      <div class="status-line" id="loginStatus"></div>
    </div>
  </main>

  <script src="login.js" defer></script>
</body>
</html>
