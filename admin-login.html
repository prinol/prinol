<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRINOL ADMIN LOGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="admin-page login-page">
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="./">PRINOL</a>
      <nav>
        <a href="./">Public Site</a>
      </nav>
    </div>
  </header>

  <main class="wrap login-layout">
    <section class="panel login-panel">
      <p class="eyebrow">Admin Login</p>
      <h1>관리자 암호 입력</h1>
      <p class="hint">올바른 암호를 입력해야 admin 페이지를 볼 수 있습니다.</p>

      <form id="loginForm" class="login-form">
        <div class="field">
          <label for="adminPassword">관리자 암호</label>
          <input id="adminPassword" name="adminPassword" type="password" autocomplete="current-password" placeholder="Cloudflare 환경의 ADMIN_KEY와 동일한 암호" required />
        </div>
        <div class="inline-actions">
          <button class="btn" type="submit">로그인</button>
          <a class="btn ghost" href="./">공개 페이지로</a>
        </div>
        <p id="loginStatus" class="hint"></p>
      </form>
    </section>
  </main>

  <script src="./login.js" defer></script>
</body>
</html>
