<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>등록 작품 관리 | PRINOL</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-shell admin-manage-layout">
    <div class="admin-topbar">
      <a class="admin-brand" href="admin.html">PRINOL ADMIN</a>
      <div class="admin-top-actions">
        <a class="ghost-button" href="admin.html">대시보드</a>
        <button class="ghost-button" id="logoutButton" type="button">로그아웃</button>
      </div>
    </div>

    <section class="page-head compact">
      <div>
        <p class="admin-eyebrow">MANAGE</p>
        <h1>등록 작품 관리</h1>
        <p class="page-subcopy">리스트에서 공개 여부와 삭제를 빠르게 관리하고, 항목 클릭 시 오른쪽에서 세부 내용을 수정할 수 있습니다.</p>
      </div>
    </section>

    <section class="manage-shell">
      <aside class="admin-panel list-panel">
        <div class="list-panel-top">
          <input id="manageSearch" type="search" placeholder="제목 / 카테고리 / 키워드 검색">

          <div class="manage-toolbar">
            <label class="field compact-field">
              <span class="field-label">정렬 기준</span>
              <select id="sortFilter">
                <option value="latest">최신순</option>
                <option value="year_desc">연도순(내림차순)</option>
                <option value="year_asc">연도순(오름차순)</option>
              </select>
            </label>

            <label class="toggle-field compact-toggle">
              <input id="publicOnlyFilter" type="checkbox">
              <span>공개만 보기</span>
            </label>
          </div>

          <div class="status-line small" id="manageCount"></div>
        </div>

        <div class="art-list" id="artList"></div>
      </aside>

      <section class="admin-panel editor-panel">
        <div class="editor-head">
          <div>
            <p class="admin-eyebrow">EDITOR</p>
            <h2 id="editorTitle">작품을 선택하세요</h2>
          </div>
          <div class="editor-actions">
            <button class="ghost-button" id="resetEditorButton" type="button">선택 해제</button>
            <button class="primary-button" id="saveArtworkButton" type="button" disabled>수정 저장</button>
          </div>
        </div>

        <div id="editorEmpty" class="editor-empty">왼쪽 리스트에서 작품을 클릭하면 여기서 세부 내용을 수정할 수 있습니다.</div>

        <form id="artworkEditor" class="admin-form-grid hidden" onsubmit="return false;">
          <div class="thumb-preview-box span-12">
            <div class="thumb-preview-inner">
              <img id="editorImage" alt="">
            </div>
          </div>

          <label class="field span-12">
            <span class="field-label">이미지 교체</span>
            <input id="editImageFile" type="file" accept="image/*">
            <small id="editImageSizeInfo" class="help-text">새 파일을 선택하지 않으면 기존 이미지를 유지합니다.</small>
          </label>

          <label class="field span-8">
            <span class="field-label">작품명</span>
            <input id="editTitle" type="text">
          </label>

          <label class="field span-4">
            <span class="field-label">연도</span>
            <input id="editYear" type="text">
          </label>

          <label class="field span-6">
            <span class="field-label">카테고리</span>
            <input id="editCategory" type="text">
          </label>

          <label class="field span-6">
            <span class="field-label">키워드</span>
            <input id="editTags" type="text">
          </label>

          <label class="field span-12">
            <span class="field-label">설명</span>
            <textarea id="editDescription" rows="10"></textarea>
          </label>

          <label class="toggle-field span-12">
            <input id="editPublic" type="checkbox">
            <span>공개 작품으로 표시</span>
          </label>
        </form>

        <div class="status-line" id="editorStatus"></div>
      </section>
    </section>
  </main>

  <script src="admin-shell.js" defer></script>
  <script src="admin-manage.js" defer></script>
</body>
</html>
