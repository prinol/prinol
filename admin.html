<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRINOL ADMIN</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="./">PRINOL</a>
      <nav class="nav-links">
        <a href="./">Public Site</a>
        <button id="logoutBtn" class="ghost-btn" type="button">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="section admin-main">
    <div class="container admin-grid">
      <section class="card admin-section">
        <p class="eyebrow">SITE PROFILE</p>
        <h1>프로필 및 텍스트 관리</h1>
        <form id="profileForm" class="stack-lg">
          <div class="grid-2">
            <div>
              <label class="field-label" for="heroTitleInput">상단 대제목</label>
              <input id="heroTitleInput" name="hero_title" type="text">
            </div>
            <div>
              <label class="field-label" for="heroSubtitleInput">상단 소제목</label>
              <input id="heroSubtitleInput" name="hero_subtitle" type="text">
            </div>
          </div>

          <div>
            <label class="field-label" for="aboutTitleInput">작가 소개 제목</label>
            <input id="aboutTitleInput" name="about_title" type="text">
          </div>

          <div>
            <label class="field-label" for="aboutBodyInput">작가 소개 본문</label>
            <textarea id="aboutBodyInput" name="about_body" rows="5"></textarea>
          </div>

          <div>
            <label class="field-label" for="awardsTextInput">수상 이력</label>
            <textarea id="awardsTextInput" name="awards_text" rows="6" placeholder="한 줄에 하나씩 입력하면 공개 페이지에서 불릿 목록으로 표시됩니다."></textarea>
          </div>

          <div class="grid-2">
            <div>
              <label class="field-label" for="contactEmailInput">이메일</label>
              <input id="contactEmailInput" name="contact_email" type="email">
            </div>
            <div>
              <label class="field-label" for="contactInstagramInput">인스타그램 URL</label>
              <input id="contactInstagramInput" name="contact_instagram" type="url">
            </div>
          </div>

          <div class="form-actions">
            <button class="primary-btn" type="submit">프로필 저장</button>
            <span id="profileStatus" class="status-text"></span>
          </div>
        </form>
      </section>

      <section class="card admin-section">
        <p class="eyebrow">UPLOAD</p>
        <h2>새 작품 등록</h2>
        <form id="artworkForm" class="stack-lg">
          <div class="grid-2">
            <div>
              <label class="field-label" for="titleInput">제목</label>
              <input id="titleInput" name="title" type="text" required>
            </div>
            <div>
              <label class="field-label" for="yearInput">연도</label>
              <input id="yearInput" name="year" type="text" placeholder="2026">
            </div>
          </div>
          <div class="grid-2">
            <div>
              <label class="field-label" for="categoryInput">카테고리</label>
              <input id="categoryInput" name="category" type="text" placeholder="Painting / Drawing / Photo">
            </div>
            <div>
              <label class="field-label" for="tagsInput">태그</label>
              <input id="tagsInput" name="tags" type="text" placeholder="abstract, ink, study">
            </div>
          </div>
          <div>
            <label class="field-label" for="descriptionInput">설명</label>
            <textarea id="descriptionInput" name="description" rows="5"></textarea>
          </div>
          <div>
            <label class="field-label" for="imageInput">이미지 파일</label>
            <input id="imageInput" name="image" type="file" accept="image/*" required>
          </div>
          <label class="checkbox-row">
            <input id="isPublicInput" name="is_public" type="checkbox" checked>
            <span>공개 작품으로 게시</span>
          </label>
          <div class="form-actions">
            <button class="primary-btn" type="submit">작품 저장</button>
            <span id="artworkStatus" class="status-text"></span>
          </div>
        </form>
      </section>

      <section class="card admin-section admin-list-section">
        <p class="eyebrow">MANAGE</p>
        <h2>등록 작품 관리</h2>
        <div id="adminList" class="admin-list"></div>
      </section>
    </div>
  </main>

  <template id="adminArtworkTemplate">
    <article class="admin-item">
      <div class="admin-item-image-wrap"><img class="admin-item-image" alt=""></div>
      <div class="admin-item-body">
        <div class="admin-item-head">
          <h3 class="admin-item-title"></h3>
          <span class="admin-item-year"></span>
        </div>
        <div class="grid-2 compact-grid">
          <input class="edit-title" type="text" placeholder="제목">
          <input class="edit-year" type="text" placeholder="연도">
          <input class="edit-category" type="text" placeholder="카테고리">
          <input class="edit-tags" type="text" placeholder="태그">
        </div>
        <textarea class="edit-description" rows="4" placeholder="설명"></textarea>
        <label class="checkbox-row small"><input class="edit-public" type="checkbox"><span>공개</span></label>
        <div class="admin-actions">
          <button class="primary-btn save-item-btn" type="button">수정 저장</button>
          <button class="danger-btn delete-item-btn" type="button">삭제</button>
        </div>
        <p class="status-text item-status"></p>
      </div>
    </article>
  </template>

  <script src="admin.js" defer></script>
</body>
</html>
