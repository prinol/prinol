<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRINOL ADMIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="admin-page">
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="./">PRINOL</a>
      <nav class="inline-actions">
        <a href="./">Public Site</a>
        <button id="logoutButton" class="btn ghost" type="button">로그아웃</button>
      </nav>
    </div>
  </header>

  <main class="wrap admin-layout">
    <section class="panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Admin Access</p>
          <h1>작품 업로드 및 관리</h1>
        </div>
        <div id="adminStatus" class="status-pill">인증됨</div>
      </div>
      <p class="hint">이 페이지는 관리자 암호 인증 후에만 표시됩니다. 브라우저를 공유하는 경우 작업 후 로그아웃하세요.</p>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Artist Profile</p>
          <h2>작가 소개 · 수상 이력 관리</h2>
        </div>
        <div id="profileStatus" class="status-pill">대기중</div>
      </div>

      <form id="profileForm" class="form-grid">
        <div class="field full">
          <label for="heroTitle">상단 대제목</label>
          <textarea id="heroTitle" name="heroTitle" rows="2" placeholder="메인 화면 상단의 큰 제목"></textarea>
        </div>
        <div class="field full">
          <label for="heroSubtitle">상단 소제목</label>
          <textarea id="heroSubtitle" name="heroSubtitle" rows="3" placeholder="메인 화면 상단의 설명 문장"></textarea>
        </div>
        <div class="field full">
          <label for="aboutTitle">작가 소개 제목</label>
          <input id="aboutTitle" name="aboutTitle" placeholder="예: 작가 소개" />
        </div>
        <div class="field full">
          <label for="artistIntro">작가 소개 문장</label>
          <textarea id="artistIntro" name="artistIntro" rows="4" placeholder="작업 세계, 재료, 관심 주제 등을 한두 문단으로 작성"></textarea>
        </div>
        <div class="field full">
          <label for="awardsText">수상 이력</label>
          <textarea id="awardsText" name="awardsText" rows="5" placeholder="한 줄에 하나씩 입력하세요. 공개 페이지에서는 불릿 목록으로 표시됩니다."></textarea>
        </div>
        <div class="field">
          <label for="contactEmail">이메일</label>
          <input id="contactEmail" name="contactEmail" type="email" placeholder="yourname@example.com" />
        </div>
        <div class="field">
          <label for="contactInstagram">인스타그램</label>
          <input id="contactInstagram" name="contactInstagram" placeholder="@yourhandle" />
        </div>
        <div class="full inline-actions">
          <button class="btn" type="submit">소개 저장</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Upload</p>
          <h2>새 작품 등록</h2>
        </div>
        <div id="uploadStatus" class="status-pill">대기중</div>
      </div>

      <form id="uploadForm" class="form-grid">
        <div class="field">
          <label for="title">제목</label>
          <input id="title" name="title" required />
        </div>
        <div class="field">
          <label for="year">연도</label>
          <input id="year" name="year" type="number" placeholder="2026" />
        </div>
        <div class="field">
          <label for="category">카테고리</label>
          <input id="category" name="category" placeholder="Painting / Drawing / Photo" />
        </div>
        <div class="field">
          <label for="tags">태그</label>
          <input id="tags" name="tags" placeholder="abstract, ink, study" />
        </div>
        <div class="field full">
          <label for="description">설명</label>
          <textarea id="description" name="description" rows="4" placeholder="작품 설명"></textarea>
        </div>
        <div class="field full">
          <label for="image">이미지</label>
          <input id="image" name="image" type="file" accept="image/*" required />
        </div>
        <label class="checkbox-row full">
          <input id="isPublic" name="isPublic" type="checkbox" checked />
          <span>공개 작품으로 즉시 게시</span>
        </label>
        <div class="full inline-actions">
          <button class="btn" type="submit">업로드</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Manage</p>
          <h2>등록된 작품</h2>
        </div>
        <button id="refreshAdminList" class="btn secondary" type="button">새로고침</button>
      </div>
      <div id="adminList" class="admin-list"></div>
    </section>
  </main>

  <script src="./admin.js" defer></script>
</body>
</html>
