<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRINOL ADMIN</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .admin-shell{max-width:1200px;margin:0 auto;padding:24px}
    .admin-topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
    .admin-grid{display:grid;grid-template-columns:1fr;gap:20px}
    .admin-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px;backdrop-filter:blur(8px)}
    .admin-card h2,.admin-card h3{margin:0 0 14px}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .admin-card input,.admin-card textarea,.admin-card select{width:100%;box-sizing:border-box;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff}
    .admin-card textarea{min-height:120px;resize:vertical}
    .admin-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    .admin-btn{padding:12px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;cursor:pointer}
    .admin-btn.primary{background:#ffffff;color:#111;border-color:#fff;font-weight:700}
    .admin-note{font-size:14px;opacity:.8;margin-top:8px}
    .status-bar{display:none;margin-bottom:16px;padding:12px 14px;border-radius:14px}
    .status-bar.show{display:block}
    .status-ok{background:rgba(50,180,90,.15);border:1px solid rgba(50,180,90,.35)}
    .status-error{background:rgba(220,80,80,.15);border:1px solid rgba(220,80,80,.35)}
    .award-help{font-size:13px;opacity:.7;margin-top:8px}
    .artwork-list{display:grid;gap:10px}
    .art-item{padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03)}
    @media (max-width: 760px){.row-2{grid-template-columns:1fr}.admin-shell{padding:16px}}
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <a href="/" class="brand">PRINOL</a>
        <nav class="header-nav">
          <a href="/" class="nav-link">Public Site</a>
          <button id="logoutBtn" class="nav-link" style="background:none;border:none;cursor:pointer">로그아웃</button>
        </nav>
      </div>
    </header>

    <main class="admin-shell">
      <div id="statusBar" class="status-bar"></div>

      <div class="admin-topbar">
        <div>
          <div class="eyebrow">ADMIN ACCESS</div>
          <h1 style="margin:6px 0 0">작품 업로드 및 관리</h1>
        </div>
      </div>

      <div class="admin-grid">
        <section class="admin-card">
          <h2>사이트 텍스트 관리</h2>
          <div class="row-2">
            <div>
              <label>상단 대제목</label>
              <input id="heroTitle" type="text" placeholder="예: PRINOL" />
            </div>
            <div>
              <label>상단 소제목</label>
              <input id="heroSubtitle" type="text" placeholder="예: Contemporary Art Portfolio" />
            </div>
          </div>
          <div class="row-2" style="margin-top:14px">
            <div>
              <label>작가 소개 제목</label>
              <input id="aboutTitle" type="text" placeholder="예: 작가 소개" />
            </div>
            <div>
              <label>이메일</label>
              <input id="contactEmail" type="email" placeholder="artist@example.com" />
            </div>
          </div>
          <div style="margin-top:14px">
            <label>인스타그램</label>
            <input id="contactInstagram" type="text" placeholder="@yourhandle 또는 URL" />
          </div>
          <div style="margin-top:14px">
            <label>작가 소개 본문</label>
            <textarea id="aboutBody" placeholder="작가 소개 문장을 입력하세요"></textarea>
          </div>
          <div style="margin-top:14px">
            <label>수상 이력</label>
            <textarea id="awardsBody" placeholder="엔터로 구분하여 입력하세요"></textarea>
            <div class="award-help">한 줄에 하나씩 입력하면 공개 페이지에서 불릿 목록으로 표시됩니다.</div>
          </div>
          <div class="admin-actions">
            <button id="saveProfileBtn" class="admin-btn primary">텍스트 저장</button>
            <button id="refreshProfileBtn" class="admin-btn">불러오기</button>
          </div>
        </section>

        <section class="admin-card">
          <h2>새 작품 등록</h2>
          <div class="row-2">
            <div>
              <label>제목</label>
              <input id="artTitle" type="text" />
            </div>
            <div>
              <label>연도</label>
              <input id="artYear" type="text" placeholder="2026" />
            </div>
          </div>
          <div class="row-2" style="margin-top:14px">
            <div>
              <label>카테고리</label>
              <input id="artCategory" type="text" placeholder="Painting / Drawing / Photo" />
            </div>
            <div>
              <label>태그</label>
              <input id="artTags" type="text" placeholder="abstract, ink, study" />
            </div>
          </div>
          <div style="margin-top:14px">
            <label>설명</label>
            <textarea id="artDescription"></textarea>
          </div>
          <div style="margin-top:14px">
            <label>이미지</label>
            <input id="artImage" type="file" accept="image/*" />
          </div>
          <div class="row-2" style="margin-top:14px">
            <div>
              <label><input id="artPublic" type="checkbox" checked /> 공개</label>
            </div>
          </div>
          <div class="admin-actions">
            <button id="uploadBtn" class="admin-btn primary">작품 업로드</button>
          </div>
          <div class="admin-note">업로드 후 공개 페이지에 즉시 반영됩니다.</div>
        </section>

        <section class="admin-card">
          <h2>작품 목록</h2>
          <div id="artworkList" class="artwork-list"></div>
        </section>
      </div>
    </main>
  </div>
  <script src="/admin.js" defer></script>
</body>
</html>
