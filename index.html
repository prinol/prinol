<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRINOL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="./">PRINOL</a>

      <div class="header-right">
        <nav class="site-nav">
          <a href="#works">Works</a>
          <a href="#about">About</a>
          <a href="admin.html">Admin</a>
        </nav>

        <button id="themeToggle" class="theme-toggle" type="button" aria-label="테마 전환" aria-pressed="false">
          <span class="theme-toggle-track">
            <span class="theme-toggle-thumb"></span>
          </span>
          <span id="themeToggleLabel" class="theme-toggle-label">Dark</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <div class="hero-inner">
        <p class="hero-kicker">ART PORTFOLIO</p>
        <h1 id="heroTitle">Selected Works</h1>
        <p id="heroSubtitle" class="hero-subtitle">PRINOL ART PORTFOLIO</p>

        <div class="hero-stats">
          <div class="hero-stat">
            <span class="hero-stat-label">공개작품수</span>
            <strong id="publicCount">0</strong>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-label">카테고리 수</span>
            <strong id="categoryCount" data-current="0">0</strong>
          </div>
        </div>
      </div>
    </section>

    <section id="works" class="works-section">
      <div class="works-toolbar">
        <div class="section-head works-head">
          <h2>Works</h2>
          <input id="keywordSearch" class="works-search" type="search" placeholder="키워드 검색">
        </div>

        <div class="filter-stack">
          <div class="filter-row">
            <label class="filter-label" for="yearFilter">연도</label>
            <select id="yearFilter" class="filter-select">
              <option value="">전체 연도</option>
            </select>
          </div>

          <div class="filter-row categories-row">
            <span class="filter-label">카테고리</span>
            <div id="categoryFilters" class="checkbox-group"></div>
          </div>
        </div>
      </div>

      <div id="worksGrid" class="works-grid" aria-live="polite"></div>
      <p id="worksEmpty" class="empty-message" hidden>등록된 공개 작품이 없습니다.</p>
      <p id="worksLoading" class="loading-message" hidden>작품을 불러오는 중...</p>
      <div id="scrollSentinel" class="scroll-sentinel" aria-hidden="true"></div>
    </section>

    <section id="about" class="about-section">
      <div class="section-head">
        <h2 id="aboutTitle">About</h2>
      </div>

      <div class="about-layout">
        <div class="about-copy">
          <p id="aboutBody">작가 소개가 여기에 표시됩니다.</p>
        </div>

        <aside class="about-side">
          <div class="info-card">
            <h3>Education &amp; Awards</h3>
            <ul id="awardsList" class="awards-list"></ul>

            <div class="email-block">
              <p>Email</p>
              <a id="emailLink"></a>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
