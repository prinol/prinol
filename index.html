<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRINOL</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-row">
      <a class="brand" href="./" id="brandText">PRINOL</a>
      <nav class="nav-links">
        <a href="#works">Works</a>
        <a href="#about">About</a>
        <a href="admin-login.html">Admin</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <p class="eyebrow">ART PORTFOLIO</p>
          <h1 id="heroTitle">PRINOL</h1>
          <p class="hero-subtitle" id="heroSubtitle">Personal Artwork Portfolio</p>
        </div>
        <div class="hero-stats compact-stats">
          <div class="stat-card">
            <span class="stat-label">공개 작품수</span>
            <strong class="stat-value" id="publicCount">0</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">카테고리 수</span>
            <strong class="stat-value" id="categoryCount">0</strong>
          </div>
        </div>
      </div>
    </section>

    <section id="works" class="section works-section">
      <div class="container">
        <div class="section-head">
          <div>
            <p class="eyebrow">WORKS</p>
            <h2>공개 작품</h2>
          </div>
          <div class="filters">
            <input id="searchInput" type="search" placeholder="작품 검색">
            <select id="yearFilter">
              <option value="">전체 연도</option>
            </select>
            <select id="categoryFilter">
              <option value="">전체 카테고리</option>
            </select>
          </div>
        </div>

        <div class="thumb-grid" id="gallery"></div>
        <p class="empty-state hidden" id="emptyState">표시할 공개 작품이 없습니다.</p>
        <div class="load-sentinel" id="loadSentinel" aria-hidden="true"></div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container two-col">
        <div class="card">
          <p class="eyebrow">ABOUT</p>
          <h2 id="aboutTitle">작가 소개</h2>
          <p class="body-copy" id="aboutBody">작가 소개 문장을 입력하세요.</p>

          <div style="height: 1.2rem;"></div>

          <div class="contact-inline">
            <span class="contact-label">Email</span>
            <a id="contactEmail" href="#">-</a>
          </div>
        </div>
        <div class="card">
          <p class="eyebrow">AWARDS</p>
          <h2>수상 이력</h2>
          <ul class="bullet-list" id="awardsList"></ul>
        </div>
      </div>
    </section>
  </main>

  <template id="artworkCardTemplate">
    <article class="thumb-card">
      <a class="thumb-link">
        <div class="thumb-image-wrap">
          <img class="thumb-image" alt="">
        </div>
        <div class="thumb-meta">
          <div class="thumb-topline">
            <h3 class="thumb-title"></h3>
            <span class="thumb-year"></span>
          </div>
          <p class="thumb-category"></p>
          <div class="thumb-tags"></div>
        </div>
      </a>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
